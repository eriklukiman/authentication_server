<div class="fetch-status">
  <span>{{totalData}} photos uploaded.</span>
</div>
<div class="image-grid">
  @for (image of images(); track trackById($index, image)) {
    <app-image-grid-item
      [image]="image"
      (opened)="openLightbox($event)"
    />
  }
</div>

@if (loading()) {
<div class="fetch-status">
  <span class="line-spinner" aria-hidden="true"></span>
  <span>Loading photos...</span>
</div>
}

@if (images().length === 0 && !loading()) {
<div class="fetch-status">
  <span>No photos found.</span>
</div>
}

<!--div class="infinite-status" *ngIf="hasMore">Loading more photos as you scroll...</div-->

<app-lightbox [image]="selectedImage" (closed)="closeLightbox()" />
