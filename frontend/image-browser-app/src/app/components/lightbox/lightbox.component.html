<div class="lb-backdrop" *ngIf="image" (click)="onBackdropClick($event)" role="dialog" aria-modal="true">
  <div class="lb-panel">

    <!-- toolbar -->
    <div class="lb-toolbar">
      <span class="lb-meta">
        <strong>{{ image.eventName }}</strong>
        <small>{{ image.location }} · {{ image.photographer }}</small>
      </span>

      <div class="lb-actions">
        <button class="lb-btn" (click)="zoomOut()" title="Zoom out (−)" [disabled]="zoom <= 0.5">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>

        <button class="lb-btn lb-zoom-label" (click)="resetZoom()" title="Reset zoom">
          {{ (zoom * 100) | number:'1.0-0' }}%
        </button>

        <button class="lb-btn" (click)="zoomIn()" title="Zoom in (+)" [disabled]="zoom >= 4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>

        <button class="lb-btn" (click)="download()" title="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>

        <button class="lb-btn lb-close" (click)="close()" title="Close (Esc)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- image -->
    <div
      class="lb-image-wrap"
      [class.is-loading]="!imageLoaded"
      [class.is-ready]="imageLoaded"
      [class.is-zoomed]="zoom > 1"
      [class.is-dragging]="isDragging"
      (pointerdown)="onDragStart($event)"
      (pointermove)="onDragMove($event)"
      (pointerup)="onDragEnd()"
      (pointercancel)="onDragEnd()"
    >
      <div class="lb-spinner" *ngIf="!imageLoaded" aria-hidden="true"></div>
      <img
        [src]="image.url"
        [alt]="image.alt"
        [class.is-loaded]="imageLoaded"
        [style.transform]="imageTransform"
        (load)="onImageLoad()"
        (error)="onImageError()"
      />
    </div>

  </div>
</div>
