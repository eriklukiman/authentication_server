<main class="container">
  <h2>Events</h2>
  <p class="sub">Client: <code>{{ clientId }}</code></p>

  @if (loading()) {
    <p class="empty">Loading events...</p>
  } @else if (events().length === 0) {
    <p class="empty">No events found for this client.</p>
  }

  <div class="event-grid">
    @for (event of events(); track event.id) {
      <a class="event-card" [routerLink]="['/', clientId, 'browse', event.name]">
        <div class="event-info">
          <strong>{{ event.name }}</strong>
          <span>{{ event.date | date:'mediumDate' }}</span>
          <span class="count">{{ event.photoCount | number:'1.0-0' }} photos</span>
        </div>
      </a>
    }
  </div>
</main>
